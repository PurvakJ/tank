<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💥 TANK SHOOTER | HEALTH KITS & ROCKETS 💥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a2a1f, #0a1208);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Courier New', monospace;
            padding: 20px;
        }

        .game-container {
            background: rgba(10, 20, 12, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 200, 0.1);
            border: 1px solid rgba(255, 200, 80, 0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px #ffcc55aa, 0 20px 35px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
            background: #2a3a1f;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
            margin-top: 20px;
            margin-bottom: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 8px 28px;
            border-radius: 80px;
            border: 1px solid #ffcc55aa;
        }

        .stats {
            display: flex;
            gap: 28px;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 8px;
            background: #1e2a1cb3;
            padding: 5px 20px;
            border-radius: 40px;
        }

        .stat-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #ffe6aa;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #FFF6B0, #ffaa44);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .powerup-badge {
            background: #2a2a5ccc;
            padding: 5px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffefb0;
            backdrop-filter: blur(4px);
        }

        .controls-badge {
            display: flex;
            gap: 15px;
            background: #00000070;
            padding: 5px 18px;
            border-radius: 60px;
            font-size: 0.65rem;
            color: #ffdd99;
        }

        .restart-btn {
            background: linear-gradient(145deg, #f5bc70, #d68a2c);
            border: none;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 6px 26px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #78461a;
            transition: 0.08s linear;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #78461a;
        }

        .instruction {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 10px;
            color: #d4ffb0;
            background: #00000070;
            padding: 4px 15px;
            border-radius: 50px;
            display: inline-block;
        }

        @media (max-width: 750px) {
            .game-container { padding: 12px 16px 18px; }
            .stat-value { font-size: 1.2rem; }
            .stat-label { font-size: 0.6rem; }
            .controls-badge { font-size: 0.5rem; padding: 3px 10px;}
            .restart-btn { padding: 4px 16px; font-size: 0.7rem; }
            .powerup-badge { font-size: 0.55rem; padding: 3px 10px;}
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="tankCanvas" width="900" height="600"></canvas>
        
        <div class="info-panel">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">💥 SCORE</span>
                    <span class="stat-value" id="scoreValue">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">❤️ HEALTH</span>
                    <span class="stat-value" id="healthValue">100</span>
                </div>
                <div class="stat">
                    <span class="stat-label">🎯 KILLS</span>
                    <span class="stat-value" id="killValue">0</span>
                </div>
            </div>
            <div class="powerup-badge" id="powerupIndicator">
                🔥 SPECIAL: READY (Rocket Ammo: 0)
            </div>
            <div class="controls-badge">
                🎮 WASD/ARROWS → MOVE | 🖱️ MOUSE → AIM | 🔫 LEFT CLICK → NORMAL | 🔥 RIGHT CLICK / R → SPECIAL
            </div>
            <button class="restart-btn" id="restartTankBtn">⚡ RESTART ⚡</button>
        </div>
        <div style="text-align: center;">
            <span class="instruction">✨ 💊 HEALTH KITS (green cross) | 🔥 ROCKET POWER-UPS (orange flame) ✨ Special deals massive damage! ✨</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('tankCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 900;
        const H = 600;
        
        // ---------- GAME STATE ----------
        let gameRunning = true;
        let animationId = null;
        let score = 0;
        let kills = 0;
        let health = 100;
        
        // UI elements
        const scoreSpan = document.getElementById('scoreValue');
        const healthSpan = document.getElementById('healthValue');
        const killSpan = document.getElementById('killValue');
        const powerupIndicator = document.getElementById('powerupIndicator');
        
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            healthSpan.innerText = Math.floor(health);
            killSpan.innerText = kills;
            updatePowerupUI();
        }
        
        // ---------- SPECIAL WEAPON SYSTEM ----------
        let rocketAmmo = 0;
        const MAX_ROCKET_AMMO = 3;
        const ROCKET_DAMAGE = 65;
        const ROCKET_BLAST_RADIUS = 55;
        
        function updatePowerupUI() {
            if(rocketAmmo > 0) {
                powerupIndicator.innerHTML = `🔥 ROCKET READY! (${rocketAmmo} ammo) 🔥`;
                powerupIndicator.style.background = "#cc5522cc";
                powerupIndicator.style.boxShadow = "0 0 8px #ff8844";
            } else {
                powerupIndicator.innerHTML = `💪 SPECIAL: Find Rocket Power-ups! 💪`;
                powerupIndicator.style.background = "#2a2a5ccc";
                powerupIndicator.style.boxShadow = "none";
            }
        }
        
        // ---------- PLAYER TANK ----------
        let player = {
            x: W/2,
            y: H/2,
            radius: 22,
            angle: 0,
            speed: 4.2,
            health: 100,
            shootCooldown: 0,
            maxCooldown: 10,
            specialCooldown: 0,
            maxSpecialCooldown: 0  // rocket uses ammo system
        };
        
        // movement flags
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            KeyW: false, KeyS: false, KeyA: false, KeyD: false
        };
        
        // mouse position
        let mouseX = player.x, mouseY = player.y;
        
        // ---------- BULLETS (normal) ----------
        let bullets = [];
        let bulletId = 0;
        const BULLET_RADIUS = 5;
        const BULLET_SPEED = 9;
        const BULLET_DAMAGE = 25;
        
        // ---------- ROCKET PROJECTILES (special) ----------
        let rockets = [];
        let rocketId = 0;
        const ROCKET_SPEED = 7.5;
        const ROCKET_RADIUS = 9;
        
        // ---------- ENEMY TANKS ----------
        let enemies = [];
        let enemyId = 0;
        let spawnCounter = 0;
        let enemyBaseSpeed = 1.1;
        const ENEMY_RADIUS = 22;
        
        // ---------- POWERUPS ----------
        let powerups = [];
        let powerupId = 0;
        let powerupSpawnCounter = 0;
        
        const POWERUP_TYPES = {
            HEALTH: { name: 'health', color: '#44ff88', symbol: '💊', effect: 'health', value: 35 },
            ROCKET: { name: 'rocket', color: '#ff8844', symbol: '🔥', effect: 'rocket', value: 2 }
        };
        
        // particle effects
        let particles = [];
        
        // ---------- UTILITY FUNCTIONS ----------
        function addExplosion(x, y, count, colorHint = "#ffaa44") {
            for(let i=0;i<count;i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 1,
                    life: 0.9,
                    size: Math.random() * 5 + 2,
                    color: colorHint
                });
            }
        }
        
        // spawn power-ups randomly on map
        function trySpawnPowerup() {
            if(!gameRunning) return;
            if(powerupSpawnCounter <= 0) {
                let randDelay = 180 + Math.random() * 180; // ~3-6 seconds
                powerupSpawnCounter = Math.floor(randDelay);
                
                let type = Math.random() < 0.5 ? POWERUP_TYPES.HEALTH : POWERUP_TYPES.ROCKET;
                // random position not too close to edges
                let x = 50 + Math.random() * (W - 100);
                let y = 50 + Math.random() * (H - 100);
                powerups.push({
                    id: powerupId++,
                    x: x, y: y,
                    radius: 14,
                    type: type,
                    color: type.color,
                    symbol: type.symbol
                });
            } else {
                powerupSpawnCounter--;
            }
        }
        
        function updatePowerups() {
            for(let i=0; i<powerups.length; i++) {
                const p = powerups[i];
                const distToPlayer = Math.hypot(player.x - p.x, player.y - p.y);
                if(distToPlayer < player.radius + p.radius) {
                    // collect powerup
                    if(p.type.effect === 'health') {
                        let healAmount = p.type.value;
                        health = Math.min(100, health + healAmount);
                        player.health = health;
                        addExplosion(p.x, p.y, 12, "#88ff88");
                        updateUI();
                    } else if(p.type.effect === 'rocket') {
                        rocketAmmo = Math.min(MAX_ROCKET_AMMO, rocketAmmo + p.type.value);
                        addExplosion(p.x, p.y, 14, "#ffaa44");
                        updatePowerupUI();
                        updateUI();
                    }
                    powerups.splice(i,1);
                    i--;
                }
            }
        }
        
        // spawn enemy
        function spawnEnemy() {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            if(side === 0) { x = Math.random() * W; y = -30; }
            else if(side === 1) { x = W + 30; y = Math.random() * H; }
            else if(side === 2) { x = Math.random() * W; y = H + 30; }
            else { x = -30; y = Math.random() * H; }
            
            x = Math.min(Math.max(x, -20), W+20);
            y = Math.min(Math.max(y, -20), H+20);
            
            let extraHealth = Math.floor(score / 400);
            let healthVal = 40 + extraHealth * 5;
            healthVal = Math.min(healthVal, 110);
            let speedVar = enemyBaseSpeed + Math.random() * 0.5 + (score / 2000);
            speedVar = Math.min(speedVar, 2.6);
            
            enemies.push({
                id: enemyId++,
                x: x, y: y,
                radius: ENEMY_RADIUS,
                health: healthVal,
                maxHealth: healthVal,
                speed: speedVar,
                angle: 0,
                color: `hsl(${20 + Math.random() * 20}, 70%, 48%)`
            });
        }
        
        // enemy AI
        function updateEnemies() {
            for(let i=0; i<enemies.length; i++) {
                const e = enemies[i];
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy);
                if(dist > 0.01) {
                    const move = Math.min(e.speed, dist - 15);
                    const angle = Math.atan2(dy, dx);
                    e.x += Math.cos(angle) * move;
                    e.y += Math.sin(angle) * move;
                    e.angle = angle;
                }
                const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if(distToPlayer < player.radius + e.radius && gameRunning) {
                    health -= 12;
                    player.health = health;
                    updateUI();
                    const pushAngle = Math.atan2(e.y - player.y, e.x - player.x);
                    player.x -= Math.cos(pushAngle) * 18;
                    player.y -= Math.sin(pushAngle) * 18;
                    e.health -= 12;
                    addExplosion(e.x, e.y, 8, "#ff8866");
                    if(e.health <= 0) {
                        kills++;
                        score += 50;
                        updateUI();
                        addExplosion(e.x, e.y, 20, "#ff9944");
                        enemies.splice(i,1);
                        i--;
                    }
                    if(health <= 0) {
                        gameRunning = false;
                        health = 0;
                        updateUI();
                    }
                    player.x = Math.min(Math.max(player.x, player.radius + 5), W - player.radius - 5);
                    player.y = Math.min(Math.max(player.y, player.radius + 5), H - player.radius - 5);
                }
            }
            for(let e of enemies) {
                e.x = Math.min(Math.max(e.x, -40), W+40);
                e.y = Math.min(Math.max(e.y, -40), H+40);
            }
        }
        
        function trySpawnEnemy() {
            if(!gameRunning) return;
            if(spawnCounter <= 0) {
                let dynamicDelay = Math.max(28, 55 - Math.floor(kills / 12));
                spawnCounter = dynamicDelay + Math.floor(Math.random() * 25);
                spawnEnemy();
            } else {
                spawnCounter--;
            }
        }
        
        // ---------- SHOOTING MECHANICS (normal & special) ----------
        function shootNormal() {
            if(!gameRunning) return;
            if(player.shootCooldown > 0) return;
            player.shootCooldown = player.maxCooldown;
            let dirX = mouseX - player.x;
            let dirY = mouseY - player.y;
            let len = Math.hypot(dirX, dirY);
            if(len < 0.001) len = 1;
            dirX /= len; dirY /= len;
            bullets.push({
                id: bulletId++,
                x: player.x + dirX * (player.radius + 6),
                y: player.y + dirY * (player.radius + 6),
                vx: dirX * BULLET_SPEED,
                vy: dirY * BULLET_SPEED,
                radius: BULLET_RADIUS,
                damage: BULLET_DAMAGE
            });
        }
        
        function shootSpecial() {
            if(!gameRunning) return;
            if(rocketAmmo <= 0) return;
            rocketAmmo--;
            updatePowerupUI();
            let dirX = mouseX - player.x;
            let dirY = mouseY - player.y;
            let len = Math.hypot(dirX, dirY);
            if(len < 0.001) len = 1;
            dirX /= len; dirY /= len;
            rockets.push({
                id: rocketId++,
                x: player.x + dirX * (player.radius + 8),
                y: player.y + dirY * (player.radius + 8),
                vx: dirX * ROCKET_SPEED,
                vy: dirY * ROCKET_SPEED,
                radius: ROCKET_RADIUS,
                damage: ROCKET_DAMAGE,
                blastRadius: ROCKET_BLAST_RADIUS
            });
        }
        
        function updateBullets() {
            for(let i=0; i<bullets.length; i++) {
                const b = bullets[i];
                b.x += b.vx; b.y += b.vy;
                if(b.x < -50 || b.x > W+50 || b.y < -50 || b.y > H+50) {
                    bullets.splice(i,1); i--; continue;
                }
                let hit = false;
                for(let j=0; j<enemies.length; j++) {
                    const e = enemies[j];
                    if(Math.hypot(b.x - e.x, b.y - e.y) < e.radius + b.radius) {
                        e.health -= b.damage;
                        hit = true;
                        addExplosion(b.x, b.y, 6, "#ffaa66");
                        if(e.health <= 0) {
                            kills++; score += 50;
                            updateUI();
                            addExplosion(e.x, e.y, 22, "#ff8844");
                            enemies.splice(j,1); j--;
                        }
                        break;
                    }
                }
                if(hit) { bullets.splice(i,1); i--; }
            }
        }
        
        // rocket with area damage
        function updateRockets() {
            for(let i=0; i<rockets.length; i++) {
                const r = rockets[i];
                r.x += r.vx; r.y += r.vy;
                if(r.x < -100 || r.x > W+100 || r.y < -100 || r.y > H+100) {
                    rockets.splice(i,1); i--; continue;
                }
                let exploded = false;
                for(let j=0; j<enemies.length; j++) {
                    const e = enemies[j];
                    const dist = Math.hypot(r.x - e.x, r.y - e.y);
                    if(dist < r.blastRadius) {
                        // area damage!
                        e.health -= r.damage;
                        addExplosion(r.x, r.y, 18, "#ff6633");
                        exploded = true;
                        if(e.health <= 0) {
                            kills++; score += 50;
                            updateUI();
                            addExplosion(e.x, e.y, 25, "#ff5522");
                            enemies.splice(j,1); j--;
                        }
                        break;
                    }
                }
                if(exploded || Math.hypot(r.x - player.x, r.y - player.y) > 1000) {
                    // also explode on wall proximity or enemy hit
                    addExplosion(r.x, r.y, 15, "#ff8844");
                    rockets.splice(i,1); i--;
                }
            }
        }
        
        // ---------- PLAYER MOVEMENT & BOUNDARIES ----------
        function updatePlayerMovement() {
            let moveX = 0, moveY = 0;
            if(keys.ArrowUp || keys.KeyW) moveY -= 1;
            if(keys.ArrowDown || keys.KeyS) moveY += 1;
            if(keys.ArrowLeft || keys.KeyA) moveX -= 1;
            if(keys.ArrowRight || keys.KeyD) moveX += 1;
            if(moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len; moveY /= len;
                player.x += moveX * player.speed;
                player.y += moveY * player.speed;
                player.angle = Math.atan2(moveY, moveX);
            }
            player.x = Math.min(Math.max(player.x, player.radius + 5), W - player.radius - 5);
            player.y = Math.min(Math.max(player.y, player.radius + 5), H - player.radius - 5);
            if(player.shootCooldown > 0) player.shootCooldown--;
            if(player.specialCooldown > 0) player.specialCooldown--;
        }
        
        function updateMouseAngle() {
            let dx = mouseX - player.x;
            let dy = mouseY - player.y;
            if(dx !== 0 || dy !== 0) player.angle = Math.atan2(dy, dx);
        }
        
        function updateParticles() {
            for(let i=0; i<particles.length; i++) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].vy += 0.15;
                particles[i].life -= 0.025;
                if(particles[i].life <= 0) { particles.splice(i,1); i--; }
            }
        }
        
        // ---------- DRAWING (powerups & rockets) ----------
        function drawPowerups() {
            for(let p of powerups) {
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = p.color + "cc";
                ctx.fill();
                ctx.font = `${p.radius + 6}px monospace`;
                ctx.fillStyle = "#fff2cc";
                ctx.shadowBlur = 3;
                ctx.fillText(p.symbol, p.x-10, p.y+8);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawRockets() {
            for(let r of rockets) {
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius-2, 0, Math.PI*2);
                ctx.fillStyle = "#ff9922";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(r.x, r.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "orange";
                ctx.fill();
                ctx.fillStyle = "#ffcc66";
                ctx.fillRect(r.x-2, r.y-8, 4, 12);
            }
        }
        
        function drawBackground() {
            ctx.fillStyle = "#2c4820";
            ctx.fillRect(0,0,W,H);
            ctx.strokeStyle = "#5c804888";
            ctx.lineWidth = 1;
            for(let i=0;i<W;i+=50){
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i%H); ctx.lineTo(W,i%H); ctx.stroke();
            }
        }
        
        function drawPlayerTank() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = "#4a6e2e";
            ctx.beginPath(); ctx.rect(-18, -14, 36, 28); ctx.fill();
            ctx.fillStyle = "#6f9e3a";
            ctx.beginPath(); ctx.rect(-14, -10, 28, 20); ctx.fill();
            ctx.fillStyle = "#4f8230";
            ctx.beginPath(); ctx.rect(-11, -11, 22, 22); ctx.fill();
            ctx.fillStyle = "#8b5a2b";
            ctx.beginPath(); ctx.ellipse(0, 0, 12, 12, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#55553a";
            ctx.fillRect(12, -4, 20, 8);
            ctx.fillStyle = "#bb8844";
            ctx.fillRect(28, -3, 8, 6);
            ctx.fillStyle = "#3a2a1a";
            ctx.fillRect(-22, -18, 44, 6);
            ctx.fillRect(-22, 12, 44, 6);
            ctx.restore();
            const hpPercent = player.health / 100;
            ctx.fillStyle = "#990000";
            ctx.fillRect(player.x-25, player.y-28, 50, 7);
            ctx.fillStyle = "#44ff44";
            ctx.fillRect(player.x-25, player.y-28, 50 * hpPercent, 6);
        }
        
        function drawEnemyTanks() {
            for(let e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.angle);
                ctx.fillStyle = "#b5472c";
                ctx.beginPath(); ctx.rect(-16, -12, 32, 24); ctx.fill();
                ctx.fillStyle = "#d46a3a";
                ctx.beginPath(); ctx.rect(-12, -8, 24, 16); ctx.fill();
                ctx.fillStyle = "#a33a1a";
                ctx.beginPath(); ctx.ellipse(0, 0, 10, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#884422";
                ctx.fillRect(10, -3, 16, 6);
                ctx.fillStyle = "#ff5555";
                ctx.beginPath(); ctx.ellipse(0, 0, 5, 5, 0, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                const hpPercent = e.health / e.maxHealth;
                ctx.fillStyle = "#551111";
                ctx.fillRect(e.x-20, e.y-26, 40, 6);
                ctx.fillStyle = "#ff8866";
                ctx.fillRect(e.x-20, e.y-26, 40 * hpPercent, 5);
                ctx.font = "bold 11px monospace";
                ctx.fillStyle = "#ffcf9a";
                ctx.fillText(`${Math.ceil(e.health)}`, e.x-11, e.y-18);
            }
        }
        
        function drawBullets() {
            for(let b of bullets) {
                ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#ffcc44"; ctx.fill();
                ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2);
                ctx.fillStyle = "orange"; ctx.fill();
            }
        }
        
        function drawParticles() {
            for(let p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }
        
        function drawUItext() {
            ctx.font = "bold 22px 'Orbitron'";
            ctx.fillStyle = "#fff2b5";
            ctx.fillText(`SCORE: ${Math.floor(score)}`, 20, 45);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#ddeeaa";
            ctx.fillText("← WASD/arrows | LMB: normal | RMB/R: rocket", 20, 85);
            if(!gameRunning) {
                ctx.font = "bold 42px 'Orbitron'";
                ctx.fillStyle = "#ffaa66";
                ctx.fillText("GAME OVER", W/2-120, H/2-40);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#fdebb3";
                ctx.fillText("click RESTART to roll out again", W/2-150, H/2+35);
            }
        }
        
        // ---------- EVENT HANDLERS ----------
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            mouseX = (clientX - rect.left) * scaleX;
            mouseY = (clientY - rect.top) * scaleY;
            mouseX = Math.min(Math.max(mouseX, 0), W);
            mouseY = Math.min(Math.max(mouseY, 0), H);
        }
        
        function handleShootNormal(e) { shootNormal(); if(e) e.preventDefault(); }
        function handleShootSpecial(e) { shootSpecial(); if(e) e.preventDefault(); }
        
        function handleKeyDown(e) {
            const code = e.code;
            if(keys.hasOwnProperty(code)) { keys[code] = true; e.preventDefault(); }
            if(code === 'Space') { shootNormal(); e.preventDefault(); }
            if(code === 'KeyR') { shootSpecial(); e.preventDefault(); }
        }
        
        function handleKeyUp(e) {
            const code = e.code;
            if(keys.hasOwnProperty(code)) { keys[code] = false; e.preventDefault(); }
        }
        
        function restartGame() {
            gameRunning = true;
            score = 0; kills = 0; health = 100;
            player.health = 100; player.x = W/2; player.y = H/2;
            bullets = []; rockets = []; enemies = []; powerups = []; particles = [];
            rocketAmmo = 0;
            spawnCounter = 10;
            powerupSpawnCounter = 40;
            updateUI(); updatePowerupUI();
        }
        
        // ---------- GAME LOOP ----------
        function updateGame() {
            if(gameRunning) {
                updatePlayerMovement();
                updateMouseAngle();
                updateBullets();
                updateRockets();
                updateEnemies();
                trySpawnEnemy();
                trySpawnPowerup();
                updatePowerups();
                updateParticles();
                player.health = health;
                if(health <= 0) { gameRunning = false; health = 0; updateUI(); }
                score += 0.1;
                updateUI();
                enemyBaseSpeed = 1.1 + (kills / 180);
                if(enemyBaseSpeed > 2.6) enemyBaseSpeed = 2.6;
            } else {
                updateParticles();
            }
        }
        
        function draw() {
            drawBackground();
            drawPowerups();
            drawEnemyTanks();
            drawPlayerTank();
            drawBullets();
            drawRockets();
            drawParticles();
            drawUItext();
            if(gameRunning) {
                ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = "#ffcc55aa"; ctx.lineWidth = 2; ctx.setLineDash([6, 8]); ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath(); ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2); ctx.strokeStyle = "#ffeebb"; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mouseX-12, mouseY); ctx.lineTo(mouseX+12, mouseY);
                ctx.moveTo(mouseX, mouseY-12); ctx.lineTo(mouseX, mouseY+12); ctx.stroke();
            }
        }
        
        function animate() { updateGame(); draw(); animationId = requestAnimationFrame(animate); }
        
        function bindEvents() {
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleMouseMove, { passive: false });
            canvas.addEventListener('click', (e) => { shootNormal(); e.preventDefault(); });
            canvas.addEventListener('contextmenu', (e) => { e.preventDefault(); shootSpecial(); return false; });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); shootNormal(); });
            document.getElementById('restartTankBtn').addEventListener('click', () => restartGame());
        }
        
        function init() { bindEvents(); restartGame(); animate(); }
        init();
    })();
</script>
</body>
</html>
